# Bar chart widget
type BarChartWidget implements BaseWidget @aws_cognito_user_pools @aws_iam {
  # BaseWidget fields
  id: ID!
  type: WidgetType!
  gridColumn: Int!
  gridRow: Int!
  colSpan: Int!
  rowSpan: Int!
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  dashboardId: ID

  # Bar chart-specific data (matching TypeScript BarChartWidget.data)
  data: BarChartWidgetData!
}

# Bar chart widget data structure
type BarChartWidgetData {
  datasets: [ChartDataset!]!
  labels: [String!]!
  orientation: ChartOrientation
}

# Metric widget
type MetricWidget implements BaseWidget @aws_cognito_user_pools @aws_iam {
  # BaseWidget fields
  id: ID!
  type: WidgetType!
  gridColumn: Int!
  gridRow: Int!
  colSpan: Int!
  rowSpan: Int!
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  dashboardId: ID

  # Metric-specific data (matching TypeScript MetricWidget.data)
  # Note: value is string | number in TypeScript, stored as String in GraphQL
  data: MetricWidgetData!
}

# Metric widget data structure
type MetricWidgetData {
  label: String!
  value: String! # Can be string or number, stored as string
  change: Float
  changeType: ChangeType
  unit: String
}

# Map widget
type MapWidget implements BaseWidget @aws_cognito_user_pools @aws_iam {
  # BaseWidget fields
  id: ID!
  type: WidgetType!
  gridColumn: Int!
  gridRow: Int!
  colSpan: Int!
  rowSpan: Int!
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  dashboardId: ID

  # Map-specific data (matching TypeScript MapWidget.data)
  data: MapWidgetData!
}

# Map widget data structure
type MapWidgetData {
  title: String
  description: String
  lat: Float!
  lon: Float!
  zoom: Int!
  mapType: MapType!
  apiKey: String!
}

# Union type for all widget types
union Widget =
    TableWidget
  | TitleWidget
  | ParagraphWidget
  | ImageWidget
  | LineChartWidget
  | BarChartWidget
  | MetricWidget
  | MapWidget

# ---------------------------
# Input Types for Mutations
# ---------------------------

# Input for creating a dashboard
input CreateDashboardInput {
  name: String!
  description: String
  gridColumns: Int
  gridRows: Int
  gap: Int
  minCellHeight: Int
  tenantId: ID
  ownerId: ID
}

# Input for updating a dashboard
input UpdateDashboardInput {
  id: ID!
  name: String
  description: String
  gridColumns: Int
  gridRows: Int
  gap: Int
  minCellHeight: Int
}

# Input for deleting a dashboard
input DeleteDashboardInput {
  id: ID!
}

# Input for creating a widget
input CreateWidgetInput {
  dashboardId: ID!
  type: WidgetType!
  gridColumn: Int!
  gridRow: Int!
  colSpan: Int!
  rowSpan: Int!
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  data: AWSJSON! # Widget-specific data as JSON
}

# Input for updating a widget
input UpdateWidgetInput {
  id: ID!
  gridColumn: Int
  gridRow: Int
  colSpan: Int
  rowSpan: Int
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  data: AWSJSON
}

# Input for deleting a widget
input DeleteWidgetInput {
  id: ID!
}

# Input for bulk widget operations
input BulkCreateWidgetsInput {
  dashboardId: ID!
  widgets: [CreateWidgetInput!]!
}

input BulkUpdateWidgetsInput {
  widgets: [UpdateWidgetInput!]!
}

input BulkDeleteWidgetsInput {
  widgetIds: [ID!]!
}

# ---------------------------
# Connection Types for Pagination
# ---------------------------

type DashboardConnection {
  items: [Dashboard!]!
  nextToken: String
}

type WidgetConnection {
  items: [Widget!]!
  nextToken: String
}

# ---------------------------
# Response Types
# ---------------------------

type BulkWidgetOperationResult {
  created: [Widget!]!
  updated: [Widget!]!
  deleted: [ID!]!
  errors: [String!]!
}

# ---------------------------
# Queries (Read Operations)
# ---------------------------

type Query @aws_cognito_user_pools @aws_iam {
  # Fetch a single dashboard by ID
  getDashboard(id: ID!): Dashboard
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  # Fetch a paginated list of dashboards
  listDashboards(limit: Int, nextToken: String, ownerId: ID, tenantId: ID): DashboardConnection!
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  # Fetch a single widget by ID (returns union type)
  getWidget(id: ID!): Widget
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  # Fetch all widgets for a specific dashboard
  listWidgetsByDashboard(
    dashboardId: ID!
    limit: Int
    nextToken: String
    sortDirection: SortDirection
  ): WidgetConnection!
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])
}

# ---------------------------
# Mutations (Create, Update, Delete Operations)
# ---------------------------

type Mutation @aws_cognito_user_pools @aws_iam {
  # Dashboard operations
  createDashboard(input: CreateDashboardInput!): Dashboard!
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  updateDashboard(input: UpdateDashboardInput!): Dashboard!
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  deleteDashboard(input: DeleteDashboardInput!): Dashboard
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  # Widget operations (return union type)
  createWidget(input: CreateWidgetInput!): Widget!
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  updateWidget(input: UpdateWidgetInput!): Widget!
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  deleteWidget(input: DeleteWidgetInput!): Widget
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  # Bulk widget operations
  bulkCreateWidgets(input: BulkCreateWidgetsInput!): BulkWidgetOperationResult!
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  bulkUpdateWidgets(input: BulkUpdateWidgetsInput!): BulkWidgetOperationResult!
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])

  bulkDeleteWidgets(input: BulkDeleteWidgetsInput!): BulkWidgetOperationResult!
    @aws_iam
    @aws_cognito_user_pools(cognito_groups: ["SystemAdmins", "TenantAdmins", "Users"])
}

# ---------------------------
# Subscriptions (Real-time Events)
# ---------------------------

type Subscription @aws_cognito_user_pools @aws_iam {
  # Subscribe to dashboard creation events
  onCreateDashboard(ownerId: ID): Dashboard
    @aws_subscribe(mutations: ["createDashboard"])

  # Subscribe to dashboard update events
  onUpdateDashboard(id: ID!): Dashboard
    @aws_subscribe(mutations: ["updateDashboard"])

  # Subscribe to dashboard deletion events
  onDeleteDashboard(ownerId: ID): Dashboard
    @aws_subscribe(mutations: ["deleteDashboard"])

  # Subscribe to widget creation events for a specific dashboard (returns union type)
  onCreateWidget(dashboardId: ID!): Widget
    @aws_subscribe(mutations: ["createWidget"])

  # Subscribe to widget update events (returns union type)
  onUpdateWidget(dashboardId: ID!): Widget
    @aws_subscribe(mutations: ["updateWidget"])

  # Subscribe to widget deletion events (returns union type)
  onDeleteWidget(dashboardId: ID!): Widget
    @aws_subscribe(mutations: ["deleteWidget"])
}

