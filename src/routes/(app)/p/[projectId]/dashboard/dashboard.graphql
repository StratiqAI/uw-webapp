# =============================================================================
# GraphQL Schema for Dashboard and Widget Management
#
# This schema defines the data model for storing dashboards and their
# widgets. It is designed for AWS AppSync and leverages directives for
# authorization. The API supports creating, updating, deleting, and querying
# dashboards with their associated widgets.
#
# TypeScript Compatibility:
# - This schema is designed to be compatible with the TypeScript types defined
#   in src/lib/dashboard/types/widget.ts
# - WidgetType enum values map as follows:
#   TypeScript -> GraphQL: 'table' -> TABLE, 'lineChart' -> LINECHART,
#   'barChart' -> BARCHART, etc.
# - BaseWidget interface matches TypeScript BaseWidget (createdAt, updatedAt,
#   dashboardId are optional for compatibility)
# - All widget data structures match their TypeScript counterparts
# =============================================================================

# ---------------------------
# Enums
# ---------------------------

# WidgetType enum - values map to TypeScript WidgetType:
# TypeScript: 'table', 'title', 'paragraph', 'image', 'lineChart', 'barChart', 'metric', 'map'
# GraphQL:    TABLE,  TITLE,  PARAGRAPH,  IMAGE,  LINECHART,  BARCHART,  METRIC,  MAP
enum WidgetType {
  TABLE
  TITLE
  PARAGRAPH
  IMAGE
  LINECHART
  BARCHART
  METRIC
  MAP
}

enum Alignment {
  LEFT
  CENTER
  RIGHT
}

enum ObjectFit {
  COVER
  CONTAIN
  FILL
}

enum ChartOrientation {
  VERTICAL
  HORIZONTAL
}

enum ChangeType {
  INCREASE
  DECREASE
}

enum MapType {
  LEAFLET
  GOOGLE
  MAPBOX
}

enum SortDirection {
  ASC
  DESC
}

# ---------------------------
# Core Data Types
# ---------------------------

# Represents a dashboard containing multiple widgets
type Dashboard @aws_cognito_user_pools @aws_iam {
  # Unique identifier for the dashboard
  id: ID!

  # Dashboard name/title
  name: String!

  # Optional description
  description: String

  # Grid configuration
  gridColumns: Int!
  gridRows: Int!
  gap: Int!
  minCellHeight: Int!

  # List of widgets in this dashboard
  widgets(limit: Int, nextToken: String, sortDirection: SortDirection): WidgetConnection!

  # Timestamps
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!

  # Ownership and sharing (if needed)
  tenantId: ID
  ownerId: ID
}

# Base widget interface - all widgets share these common fields
# Matches TypeScript BaseWidget interface from widget.ts
# Note: createdAt, updatedAt, and dashboardId are database fields
# and are optional to maintain compatibility with TypeScript types
interface BaseWidget {
  # Unique identifier for the widget
  id: ID!

  # Widget type (enum values map to TypeScript: table->TABLE, lineChart->LINECHART, etc.)
  type: WidgetType!

  # Grid position
  gridColumn: Int!
  gridRow: Int!

  # Grid size
  colSpan: Int!
  rowSpan: Int!

  # Constraints (all optional, matching TypeScript WidgetConstraints)
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int

  # Optional metadata (matching TypeScript BaseWidget)
  locked: Boolean
  title: String
  description: String

  # Database fields (optional for TypeScript compatibility)
  # These are populated by AppSync/DynamoDB but not required in TypeScript BaseWidget
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  dashboardId: ID
}

# ---------------------------
# Widget Data Types (for type-safe data structures)
# ---------------------------

# Supporting types for charts
# ChartDataset matches both LineChartWidget and BarChartWidget data structures
# LineChartWidget uses: { label, data, color? }
# BarChartWidget uses: { label, data, backgroundColor? }
# Both are compatible - color/backgroundColor are optional
type ChartDataset {
  label: String!
  data: [Float!]!
  color: String # Used by LineChartWidget
  backgroundColor: String # Used by BarChartWidget
}

type ChartOptions {
  responsive: Boolean
  maintainAspectRatio: Boolean
}

# ---------------------------
# Specific Widget Types (implementing BaseWidget interface)
# ---------------------------

# Table widget
type TableWidget implements BaseWidget @aws_cognito_user_pools @aws_iam {
  # BaseWidget fields
  id: ID!
  type: WidgetType!
  gridColumn: Int!
  gridRow: Int!
  colSpan: Int!
  rowSpan: Int!
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  dashboardId: ID

  # Table-specific data (matching TypeScript TableWidget.data)
  data: TableWidgetData!
}

# Table widget data structure
type TableWidgetData {
  title: String
  headers: [String!]!
  rows: [AWSJSON!]! # Array of row objects (key-value pairs)
  sortable: Boolean
  paginated: Boolean
}

# Title widget
type TitleWidget implements BaseWidget @aws_cognito_user_pools @aws_iam {
  # BaseWidget fields
  id: ID!
  type: WidgetType!
  gridColumn: Int!
  gridRow: Int!
  colSpan: Int!
  rowSpan: Int!
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  dashboardId: ID

  # Title-specific data (matching TypeScript TitleWidget.data)
  data: TitleWidgetData!
}

# Title widget data structure
type TitleWidgetData {
  title: String!
  subtitle: String
  alignment: Alignment
}

# Paragraph widget
type ParagraphWidget implements BaseWidget @aws_cognito_user_pools @aws_iam {
  # BaseWidget fields
  id: ID!
  type: WidgetType!
  gridColumn: Int!
  gridRow: Int!
  colSpan: Int!
  rowSpan: Int!
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  dashboardId: ID

  # Paragraph-specific data (matching TypeScript ParagraphWidget.data)
  # Note: title can be null in TypeScript, markdown can be null
  data: ParagraphWidgetData!
}

# Paragraph widget data structure (matching TypeScript ParagraphWidget.data)
type ParagraphWidgetData {
  title: String # Can be null in TypeScript
  content: String!
  markdown: Boolean # Can be null in TypeScript
}

# Image widget
type ImageWidget implements BaseWidget @aws_cognito_user_pools @aws_iam {
  # BaseWidget fields
  id: ID!
  type: WidgetType!
  gridColumn: Int!
  gridRow: Int!
  colSpan: Int!
  rowSpan: Int!
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  dashboardId: ID

  # Image-specific data (matching TypeScript ImageWidget.data)
  data: ImageWidgetData!
}

# Image widget data structure
type ImageWidgetData {
  title: String
  src: String!
  alt: String!
  objectFit: ObjectFit
}

# Line chart widget
type LineChartWidget implements BaseWidget @aws_cognito_user_pools @aws_iam {
  # BaseWidget fields
  id: ID!
  type: WidgetType!
  gridColumn: Int!
  gridRow: Int!
  colSpan: Int!
  rowSpan: Int!
  minWidth: Int
  minHeight: Int
  maxWidth: Int
  maxHeight: Int
  locked: Boolean
  title: String
  description: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  dashboardId: ID

  # Line chart-specific data (matching TypeScript LineChartWidget.data)
  data: LineChartWidgetData!
}

# Line chart widget data structure
type LineChartWidgetData {
