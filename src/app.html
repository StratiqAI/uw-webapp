<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- Blocking script to prevent theme flash - must run before any styles -->
		<script>
			(function() {
				try {
					var STORAGE_KEY = 'app-theme';
					var saved = localStorage.getItem(STORAGE_KEY);

					// Migrate old 'darkMode' boolean key to new theme key
					if (!saved) {
						var oldDark = localStorage.getItem('darkMode');
						if (oldDark === 'true') saved = 'dark';
						else if (oldDark === 'false') saved = 'light';
					}

					var theme = (saved === 'light' || saved === 'dark' || saved === 'warm')
						? saved
						: (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

					var html = document.documentElement;

					if (theme === 'dark') {
						html.classList.add('dark');
					} else {
						html.classList.remove('dark');
					}
					html.setAttribute('data-theme', theme);

					var bg   = { dark: '#0f172a', light: '#dbeafe', warm: '#ece5d3' };
					var text = { dark: '#f1f5f9', light: '#0f172a', warm: '#3a2e1c' };

					var style = document.createElement('style');
					style.id = 'theme-prevent-flash';
					style.textContent = 'html,body{background-color:' + bg[theme] + '!important;color:' + text[theme] + '!important}';
					document.head.appendChild(style);

					window.addEventListener('load', function() {
						setTimeout(function() {
							var el = document.getElementById('theme-prevent-flash');
							if (el) el.remove();
						}, 100);
					});
				} catch (e) {}
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
		%sveltekit.head%
		<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.6.0/leaflet.js"></script>
		<script
			type="text/javascript"
			src="https://api.tiles.mapbox.com/mapbox-gl-js/v1.4.0/mapbox-gl.js"
		></script>
		<link
			rel="stylesheet"
			type="text/css"
			href="https://api.tiles.mapbox.com/mapbox-gl-js/v1.4.0/mapbox-gl.css"
		/>
		<link
			rel="stylesheet"
			type="text/css"
			href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.6.0/leaflet.css"
		/>
		<script
			type="text/javascript"
			src="https://cdn.jsdelivr.net/npm/mapbox-gl-leaflet@0.0.16/leaflet-mapbox-gl.js"
		></script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
