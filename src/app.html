<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- Blocking script to prevent dark mode flash - must run before any styles -->
		<script>
			(function() {
				try {
					const saved = localStorage.getItem('darkMode');
					let isDark = false;
					
					if (saved !== null) {
						isDark = saved === 'true';
					} else {
						// Check system preference
						isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					}
					
					// Apply dark class immediately
					if (isDark) {
						document.documentElement.classList.add('dark');
					} else {
						document.documentElement.classList.remove('dark');
					}
					
					// Set inline styles immediately to prevent flash - match theme colors
					const style = document.createElement('style');
					style.id = 'dark-mode-prevent-flash';
					style.textContent = isDark 
						? 'html, body { background-color: #0f172a !important; color: #f1f5f9 !important; }'
						: 'html, body { background-color: #dbeafe !important; color: #0f172a !important; }';
					document.head.appendChild(style);
					
					// Remove the inline style once page loads so CSS can take over
					window.addEventListener('load', function() {
						setTimeout(function() {
							const flashPrevent = document.getElementById('dark-mode-prevent-flash');
							if (flashPrevent) {
								flashPrevent.remove();
							}
						}, 100);
					});
				} catch (e) {
					// Silently fail if localStorage is not available
				}
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
		%sveltekit.head%
		<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.6.0/leaflet.js"></script>
		<script
			type="text/javascript"
			src="https://api.tiles.mapbox.com/mapbox-gl-js/v1.4.0/mapbox-gl.js"
		></script>
		<link
			rel="stylesheet"
			type="text/css"
			href="https://api.tiles.mapbox.com/mapbox-gl-js/v1.4.0/mapbox-gl.css"
		/>
		<link
			rel="stylesheet"
			type="text/css"
			href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.6.0/leaflet.css"
		/>
		<script
			type="text/javascript"
			src="https://cdn.jsdelivr.net/npm/mapbox-gl-leaflet@0.0.16/leaflet-mapbox-gl.js"
		></script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
